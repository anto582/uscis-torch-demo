<style>
 :root{--bg:#0B0E14;--soft:#1A2230;--border:#222B3A;--text:#E6ECF5;--muted:#8A98AE;--accent:#5AA2FF;--crit:#F87171}
 *{box-sizing:border-box}html,body{height:100%}
 body{margin:0;background:radial-gradient(1200px 600px at 50% -10%,#13203a 0%,var(--bg) 55%);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;display:flex;align-items:center;justify-content:center}
 .card{width:min(92vw,380px);background:#121722;border:1px solid var(--border);border-radius:16px;padding:30px 28px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.45)}
 .lock{font-size:34px}
 h1{font-size:19px;margin:10px 0 4px}
 p{color:var(--muted);font-size:13px;margin:0 0 18px}
 form{display:flex;flex-direction:column;gap:10px}
 input{font:inherit;font-size:16px;padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:var(--soft);color:var(--text);text-align:center}
 input:focus{outline:none;border-color:var(--accent)}
 button{font:inherit;font-size:15px;font-weight:600;padding:12px;border-radius:10px;border:none;background:var(--accent);color:#06101F;cursor:pointer}
 button:hover{filter:brightness(1.08)}
 .err{color:var(--crit);font-size:13px;min-height:18px;margin-top:10px}
 .foot{margin-top:16px;color:var(--muted);font-size:11px;opacity:.7}
</style></head><body>
